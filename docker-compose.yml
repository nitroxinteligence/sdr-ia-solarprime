version: '3.8'

services:
  sdr-api:
    build:
      context: .
      dockerfile: prod/Dockerfile
    container_name: sdr-ia-solarprime
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./credentials:/app/credentials:ro
    networks:
      - sdr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: sdr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - sdr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Evolution API (opcional - descomente se quiser rodar local)
  # evolution-api:
  #   image: atendai/evolution-api:v2.1.0
  #   container_name: evolution-api
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - NODE_ENV=production
  #     - WEBHOOK_URL=http://sdr-api:8000/webhooks/evolution
  #   volumes:
  #     - evolution-data:/evolution/instances
  #   networks:
  #     - sdr-network
  #   restart: unless-stopped

networks:
  sdr-network:
    driver: bridge

volumes:
  redis-data:
  evolution-data: